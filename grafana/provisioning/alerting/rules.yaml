apiVersion: 1

groups:
  - orgId: 1
    name: pipeline-health-30s
    folder: monitoring
    interval: 30s
    rules:

      # ======================================================
      # CRITICAL: No new ingest for > 13 minutes (780s)
      # ======================================================
      - uid: stale_ingest_7m
        title: Time Since Last Ingest > 13m
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "No new ingested rows for more than 13 minutes"
          description: "Pipeline health: time_since_last_ingest_seconds > 780 for 2 minutes."
        labels:
          severity: critical
          component: pipeline
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 900
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(time_since_last_ingest_seconds, 999999) AS v
                FROM monitoring.pipeline_metrics;

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [780]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # WARNING: BTC heartbeat (last 20m) < 2
      # ======================================================
      - uid: btc_events_last_15m_low
        title: BTC events (last 20m) < 2
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "Too few BTC events in the last 20 minutes"
          description: "BTC 24/7 heartbeat. Expected at least 2 events in the last 20 minutes. Fires when btc_events_last_20m < 2 for 2 minutes."
        labels:
          severity: warning
          component: pipeline
          commodity: bitcoin
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 900
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(btc_events_last_20m, 0) AS v
                FROM monitoring.pipeline_metrics;

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [2]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # WARNING: API errors in last 18m >= 1
      # ======================================================
      - uid: api_errors_18m_ge_1
        title: "[WARN] API errors (18m) >= 1"
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "At least 1 API error in last 18 minutes"
          description: "API reliability: errors_18m >= 1 for 2 minutes."
        labels:
          severity: warning
          component: api
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 1200
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(errors_18m, 0) AS v
                FROM monitoring.api_metrics_18m;

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # CRITICAL: API errors in last 18m >= 3
      # ======================================================
      - uid: api_errors_18m_ge_3
        title: "[CRIT] API errors (18m) >= 3"
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "3 or more API errors in last 18 minutes"
          description: "API reliability: errors_18m >= 3 for 2 minutes."
        labels:
          severity: critical
          component: api
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 1200
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(errors_18m, 0) AS v
                FROM monitoring.api_metrics_18m;

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [2]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # WARNING: DLQ events last 15 minutes > 0
      # ======================================================
      - uid: dlq_events_last_15m_gt_0
        title: "[WARN] DLQ events (15m) > 0"
        condition: C
        for: 2m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: "DLQ has events in last 15 minutes"
          description: "Data quality issue: dead_letter_events count in last 15 minutes is > 0 for 2 minutes."
        labels:
          severity: warning
          component: dlq
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 1200
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT count(*)::bigint AS v
                FROM monitoring.dead_letter_events
                WHERE ts_utc >= now() - interval '15 minutes';

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # WARNING: Kafka consumer lag > 50
      # ======================================================
      - uid: kafka_lag_warn_gt_50
        title: "[WARN] Kafka lag > 50"
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "Kafka consumer lag is above 50"
          description: "Backlog detected: total_lag > 50 for 2 minutes."
        labels:
          severity: warning
          component: kafka
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 900
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(total_lag, 0)::bigint AS v
                FROM monitoring.kafka_lag_latest
                WHERE group_id = 'spark_stream_raw_prices'
                  AND topic = 'commodity_prices';

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [50]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # CRITICAL: Kafka consumer lag > 500
      # ======================================================
      - uid: kafka_lag_crit_gt_500
        title: "[CRIT] Kafka lag > 500"
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "Kafka consumer lag is above 500"
          description: "Backlog detected: total_lag > 500 for 2 minutes."
        labels:
          severity: critical
          component: kafka
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 900
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(total_lag, 0)::bigint AS v
                FROM monitoring.kafka_lag_latest
                WHERE group_id = 'spark_stream_raw_prices'
                  AND topic = 'commodity_prices';

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [500]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # WARNING: dbt test failures in last 35 minutes
      # ======================================================
      - uid: dbt_test_failures_35m
        title: "[WARN] dbt test failures (35m)"
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "dbt tests failed in the last 35 minutes"
          description: "Data quality: at least one dbt test run with status=FAIL in the last 35 minutes. Check monitoring.dbt_test_runs for details."
        labels:
          severity: warning
          component: dbt
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 2400
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT count(*)::bigint AS v
                FROM monitoring.dbt_test_runs
                WHERE run_ts_utc >= now() - interval '35 minutes'
                  AND status = 'FAIL';

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # WARNING: Single partition Kafka lag > 30
      # ======================================================
      - uid: kafka_partition_lag_warn_gt_30
        title: "[WARN] Kafka partition lag > 30"
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "A single Kafka partition has lag above 30"
          description: "Per-partition lag: max_partition_lag > 30 for 2 minutes. A stuck partition may be masked by healthy total lag."
        labels:
          severity: warning
          component: kafka
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 900
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(max_partition_lag, 0)::bigint AS v
                FROM monitoring.kafka_lag_latest
                WHERE group_id = 'spark_stream_raw_prices'
                  AND topic = 'commodity_prices';

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [30]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # WARNING: No successful backup in last 25 hours
      # ======================================================
      - uid: backup_stale_25h
        title: "[WARN] No backup in 25h"
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "No successful backup recorded in the last 25 hours"
          description: "Backup freshness: no row with status='OK' in monitoring.backup_log for more than 25 hours."
        labels:
          severity: warning
          component: backup
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 900
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(
                  EXTRACT(EPOCH FROM (now() - MAX(backup_ts)))::bigint,
                  999999
                ) AS v
                FROM monitoring.backup_log
                WHERE status = 'OK';

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [90000]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query

      # ======================================================
      # WARNING: mart_latest_prices stale (> 20 min)
      # ======================================================
      - uid: mart_latest_prices_stale_15m
        title: "[WARN] Stale mart_latest_prices (>20m)"
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: "mart_latest_prices has not been refreshed in more than 20 minutes"
          description: "Analytics freshness: the newest last_timestamp in analytics.mart_latest_prices is older than 20 minutes. This may indicate dbt failures or upstream pipeline stall."
        labels:
          severity: warning
          component: dbt
        data:
          - refId: A
            datasourceUid: postgres
            relativeTimeRange:
              from: 900
              to: 0
            model:
              format: table
              intervalMs: 1000
              maxDataPoints: 1
              rawSql: |
                SELECT COALESCE(
                  EXTRACT(EPOCH FROM (now() - MAX(last_timestamp AT TIME ZONE 'UTC')))::bigint,
                  999999
                ) AS v
                FROM analytics.mart_latest_prices;

          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings: {}

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [1200]
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query
name: streaming_system

services:

  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:16.13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "min_wal_size=64MB"
      - "-c"
      - "max_wal_size=256MB"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
      - ./ops/sql:/ops/sql:ro
      - ./ops/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # pgAdmin (DEV only)
  # =========================
  pgadmin:
    image: dpage/pgadmin4:9.14
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - database
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # Kafka (KRaft mode – no Zookeeper)
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.9.6
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"

      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168

      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - messaging
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 40
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # Kafka UI (DEV only)
  # =========================
  kafka-ui:
    # kafbat/kafka-ui is the actively maintained community fork of the
    # now-dormant provectuslabs/kafka-ui. Env vars (KAFKA_CLUSTERS_0_*)
    # are drop-in compatible with the Provectus image.
    image: kafbat/kafka-ui:v1.4.2
    profiles: ["dev"]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "magisterka"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
    networks:
      - messaging
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # Kafka Lag
  # =========================
  kafka-lag:
    profiles: ["ops"]
    build: ./ops/kafka-lag
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    networks:
      - messaging
      - database
    read_only: true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # Grafana (localhost only)
  # =========================
  grafana:
    image: grafana/grafana:11.6.14
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: UTC
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/market_overview.json
      # Disable anonymous access
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ORG_ROLE: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - database
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # Alert Receiver (Grafana webhook -> Postgres)
  # =========================
  alert-receiver:
    build: ./ops/alert-receiver
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - database
      - frontend
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2).read(); print('ok')\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # Spark Base (manual/debug)
  # =========================
  spark:
    image: apache/spark:3.5.8
    user: "0:0"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./spark:/opt/spark-app:ro
      - spark_ivy_cache:/home/spark/.ivy2
    networks:
      - messaging
      - database
    command:
      - bash
      - -lc
      - |
          chown -R 185:185 /home/spark/.ivy2
          exec setpriv --reuid=185 --regid=185 --init-groups sleep infinity
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: unless-stopped

  # =========================
  # Spark Streaming Job
  # =========================
  spark-stream:
    image: apache/spark:3.5.8
    user: "0:0"        # root for chown only; spark-submit drops to spark (185) via setpriv
    init: true
    stop_grace_period: 2m

    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

    env_file:
      - .env

    environment:
      PG_TARGET_TABLE: "public.raw_prices"
      PG_STAGING_TABLE: "ingest.raw_prices_staging"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${SPARK_DB_USER}
      POSTGRES_PASSWORD: ${SPARK_DB_PASSWORD}

      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: ${KAFKA_TOPIC}

      JDBC_CONNECT_TIMEOUT: ${JDBC_CONNECT_TIMEOUT:-10}
      JDBC_SOCKET_TIMEOUT: ${JDBC_SOCKET_TIMEOUT:-30}

      SPARK_CHECKPOINT_DIR: /home/spark/checkpoints/raw_prices

    volumes:
      - ./spark:/opt/spark-app:ro
      - spark_ivy_cache:/home/spark/.ivy2
      - spark_checkpoints:/home/spark/checkpoints

    networks:
      - messaging
      - database

    # Start as root only to fix volume ownership, then drop to spark (185) via setpriv
    command:
      - /bin/bash
      - -lc
      - |
          chown -R 185:185 /home/spark/.ivy2 /home/spark/checkpoints
          mkdir -p /home/spark/checkpoints/raw_prices
          chown 185:185 /home/spark/checkpoints/raw_prices
          exec setpriv --reuid=185 --regid=185 --init-groups \
            /opt/spark/bin/spark-submit \
            --driver-memory 512m \
            --conf spark.driver.maxResultSize=128m \
            --conf spark.sql.session.timeZone=UTC \
            --conf spark.jars.ivy=/home/spark/.ivy2 \
            --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.8,org.postgresql:postgresql:42.7.10 \
            /opt/spark-app/stream_to_postgres.py
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[s]park-submit' && find /home/spark/checkpoints/raw_prices -maxdepth 1 -mmin -10 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
    restart: unless-stopped

  # =========================
  # Producer (API -> Kafka)
  # =========================
  producer:
    build: ./producer
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP: kafka:29092
    command: ["python", "-u", "producer.py"]
    networks:
      - messaging
      - database
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # dbt (manual / on-demand)
  # =========================
  dbt:
    # Reuse the dbt-scheduler image so manual `make dbt-*` commands run on the
    # same dbt environment as the scheduler (no version drift, single CVE surface).
    build:
      context: ./ops/dbt-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /dbt
    volumes:
      - ./dbt:/dbt
    env_file:
      - .env
    environment:
      DBT_PROFILES_DIR: /dbt
      DBT_TARGET_PATH: /tmp/dbt_target
      DBT_LOG_PATH: /tmp/dbt_logs
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]
    networks:
      - database
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # dbt Scheduler (auto refresh marts)
  # =========================
  dbt-scheduler:
    build: ./ops/dbt-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DBT_PROFILES_DIR: /dbt
      DBT_TARGET: "dev"
      DBT_TARGET_PATH: /tmp/dbt_target
      DBT_LOG_PATH: /tmp/dbt_logs
      DQ_ENVIRONMENT: "dev"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      DBT_DB_USER: ${DBT_DB_USER}
      DBT_DB_PASSWORD: ${DBT_DB_PASSWORD}
      POSTGRES_USER: ${DBT_DB_USER}
      POSTGRES_PASSWORD: ${DBT_DB_PASSWORD}
    volumes:
      - ./dbt:/dbt
      - ./ops/sql:/ops/sql:ro
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/dbt_scheduler_alive && find /tmp/dbt_scheduler_alive -mmin -10 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # Retention (OPS daemon - runs every 24h alongside dbt-scheduler retention)
  # =========================
  retention:
    profiles: ["ops"]
    build: ./ops/retention-image
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./ops/sql:/ops/sql:ro
    networks:
      - database
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # =========================
  # Backup (OPS job - run automatically) (daemon)
  # =========================
  backup-cron:
    profiles: ["ops"]
    image: postgres:16.13
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${BACKUP_DB_USER?err}
      PGPASSWORD: ${BACKUP_DB_PASSWORD?err}
      PGDATABASE: ${POSTGRES_DB?err}
    volumes:
      - ./backups:/backups
    networks:
      - database
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
          set -u
          echo "Backup service started (every 2 hours)."

          while true; do
            # Include seconds to avoid filename collisions on restarts
            ts="$$(date +%Y%m%d_%H%M%S)"
            out="/backups/backup_$${ts}.dump"
            base="$$(basename "$$out")"
            err_file="/tmp/pg_dump_err_$$ts.log"

            echo "Running backup at $$(date -Is) -> $$out"

            # Use lock wait timeout so backups fail fast instead of hanging on locks
            if pg_dump -h "$$PGHOST" -p "$$PGPORT" -U "$$PGUSER" -d "$$PGDATABASE" \
                --lock-wait-timeout=30 \
                -F c -f "$$out" 2> "$$err_file"; then

              size="$$(stat -c%s "$$out" 2>/dev/null || echo 0)"
              echo "Backup OK: $$out ($$size bytes)"

              # Log OK to Postgres (best-effort, keep container alive even if logging fails)
              psql -X -h "$$PGHOST" -p "$$PGPORT" -U "$$PGUSER" -d "$$PGDATABASE" -v ON_ERROR_STOP=1 \
                -c "INSERT INTO monitoring.backup_log (file_name, file_size_bytes, status, error_msg)
                    VALUES ('$$base', $$size, 'OK', NULL);" \
                >/dev/null 2>&1 || echo "WARNING: failed to insert OK backup log"

              rm -f "$$err_file" >/dev/null 2>&1 || true

              # Keep last 360 backups (2h cadence * 30 days)
              ls -1t /backups/backup_*.dump | tail -n +361 | xargs -r rm -f

              sleep 7200
            else
              # Capture more context (not only the last line)
              err_msg="$$(tail -n 20 "$$err_file" 2>/dev/null | tr '\n' ' ' | tr -d '\r' | head -c 1500)"
              # Escape single quotes for SQL literal
              err_sql="$$(printf "%s" "$$err_msg" | sed "s/'/''/g")"

              echo "Backup FAILED at $$(date -Is): $$err_msg"

              # Remove partial file if any
              rm -f "$$out" >/dev/null 2>&1 || true

              # Log FAILED to Postgres (best-effort)
              psql -X -h "$$PGHOST" -p "$$PGPORT" -U "$$PGUSER" -d "$$PGDATABASE" -v ON_ERROR_STOP=1 \
                -c "INSERT INTO monitoring.backup_log (file_name, file_size_bytes, status, error_msg)
                    VALUES ('$$base', NULL, 'FAILED', '$$err_sql');" \
                >/dev/null 2>&1 || echo "WARNING: failed to insert FAILED backup log"

              rm -f "$$err_file" >/dev/null 2>&1 || true

              sleep 60
            fi
          done

networks:
  # Database tier — only services that need direct Postgres access
  database:
  # Message bus tier — only Kafka producers and consumers
  messaging:
  # Frontend tier — web-facing services (Grafana, pgAdmin)
  frontend:

volumes:
  pgdata:
  kafka_data:
  grafana_data:
  pgadmin_data:
  spark_ivy_cache:
  spark_checkpoints:

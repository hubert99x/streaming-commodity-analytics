name: python-quality

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r producer/requirements.txt
          python -m pip install "pytest>=7.0,<9.0" "ruff>=0.4,<1.0"

      - name: Run Ruff lint
        run: |
          ruff check producer tests ops

      - name: Run unit tests
        run: |
          pytest -q
name: security-trivy

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build project images
        run: |
          docker build -t magisterka/producer:ci ./producer
          docker build -t magisterka/alert-receiver:ci ./ops/alert-receiver
          docker build -t magisterka/dbt-scheduler:ci ./ops/dbt-scheduler
          docker build -t magisterka/kafka-lag:ci ./ops/kafka-lag
          docker build -t magisterka/retention:ci ./ops/retention-image

      - name: Trivy image scan (producer)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: image
          image-ref: magisterka/producer:ci
          format: table
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: 1

      - name: Trivy scan remaining images
        run: |
          docker run --rm aquasec/trivy:latest image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/alert-receiver:ci
          docker run --rm aquasec/trivy:latest image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/dbt-scheduler:ci
          docker run --rm aquasec/trivy:latest image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/kafka-lag:ci
          docker run --rm aquasec/trivy:latest image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/retention:ci
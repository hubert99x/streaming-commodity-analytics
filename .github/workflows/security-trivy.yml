name: security-trivy

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trivy filesystem scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            aquasec/trivy:0.69.3 \
            fs --scanners vuln --ignore-unfixed --severity HIGH,CRITICAL \
            --ignorefile /workspace/.trivyignore --exit-code 1 .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build project images
        run: |
          docker build -t magisterka/producer:ci ./producer
          docker build -t magisterka/alert-receiver:ci ./ops/alert-receiver
          docker build -t magisterka/dbt-scheduler:ci ./ops/dbt-scheduler
          docker build -t magisterka/kafka-lag:ci ./ops/kafka-lag
          docker build -t magisterka/retention:ci ./ops/retention-image

      # Scan both OS and library vulnerabilities.
      # OS CVEs in our custom images are our responsibility since we run
      # apt-get upgrade in Dockerfiles. The .trivyignore file suppresses
      # known false positives from upstream base images.
      - name: Trivy scan images (OS + library vulnerabilities)
        run: |
          TRIVYIGNORE="${{ github.workspace }}/.trivyignore"
          IMAGES=(
            magisterka/producer:ci
            magisterka/alert-receiver:ci
            magisterka/dbt-scheduler:ci
            magisterka/kafka-lag:ci
            magisterka/retention:ci
          )

          for img in "${IMAGES[@]}"; do
            echo "::group::Scanning ${img}"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "${TRIVYIGNORE}:/trivyignore:ro" \
              aquasec/trivy:0.69.3 \
              image --ignore-unfixed --severity HIGH,CRITICAL \
              --vuln-type os,library \
              --ignorefile /trivyignore --exit-code 1 "${img}"
            echo "::endgroup::"
          done

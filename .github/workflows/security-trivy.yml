name: security-trivy

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            aquasec/trivy:latest \
            fs --severity CRITICAL --exit-code 1 .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build project images
        run: |
          docker build -t magisterka/producer:ci ./producer
          docker build -t magisterka/alert-receiver:ci ./ops/alert-receiver
          docker build -t magisterka/dbt-scheduler:ci ./ops/dbt-scheduler
          docker build -t magisterka/kafka-lag:ci ./ops/kafka-lag
          docker build -t magisterka/retention:ci ./ops/retention-image

      - name: Trivy image scan (producer)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/producer:ci

      - name: Trivy scan remaining images
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/alert-receiver:ci

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/dbt-scheduler:ci

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/kafka-lag:ci

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest \
            image --ignore-unfixed --severity CRITICAL --exit-code 1 magisterka/retention:ci
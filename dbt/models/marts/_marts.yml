version: 2

# ======================================================
# MART MODELS
# ======================================================
models:
  - name: mart_latest_prices
    description: "Latest known price per commodity + symbol (1 row per instrument). Built from stg_raw_prices."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["commodity", "symbol"]
      - dbt_utils.expression_is_true:
          expression: "last_price > 0"

    columns:
      - name: commodity
        description: "Instrument key (gold/bitcoin/eurusd)."
        data_tests:
          - not_null
          - accepted_values:
              values: ["gold", "bitcoin", "eurusd"]

      - name: symbol
        description: "Market symbol (XAU/USD, BTC/USD, EUR/USD)."
        data_tests:
          - not_null

      - name: last_timestamp
        description: "Timestamp of the latest observed event (UTC)."
        data_tests:
          - not_null

      - name: last_price
        description: "Latest observed price."
        data_tests:
          - not_null

      - name: currency
        description: "Quote currency (USD)."
        data_tests:
          - not_null
          - accepted_values:
              values: ["USD"]

      - name: source
        description: "Data source identifier (e.g., twelvedata_rest)."
        data_tests:
          - not_null

  - name: mart_minute_last_price
    description: "Minute-level aggregated statistics per commodity + symbol (minute bucket)."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["commodity", "symbol", "minute_bucket"]
      - dbt_utils.expression_is_true:
          expression: "min_price <= max_price"
      - dbt_utils.expression_is_true:
          expression: "last_price > 0"
      - dbt_utils.expression_is_true:
          expression: "min_price > 0"
      - dbt_utils.expression_is_true:
          expression: "max_price > 0"
      - dbt_utils.expression_is_true:
          expression: "n >= 1"

    columns:
      - name: commodity
        description: "Instrument key (gold/bitcoin/eurusd)."
        data_tests:
          - not_null
          - accepted_values:
              values: ["gold", "bitcoin", "eurusd"]

      - name: symbol
        description: "Market symbol."
        data_tests:
          - not_null

      - name: minute_bucket
        description: "UTC minute bucket for the aggregation."
        data_tests:
          - not_null

      - name: last_price
        description: "Last observed price inside the minute."
        data_tests:
          - not_null

      - name: n
        description: "Number of raw events observed in that minute."
        data_tests:
          - not_null

      - name: min_price
        description: "Minimum price in the minute."
        data_tests:
          - not_null

      - name: max_price
        description: "Maximum price in the minute."
        data_tests:
          - not_null

  - name: mart_price_events
    description: "Detected significant price changes between consecutive observations."
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "price_change_pct is not null"

    columns:
      - name: commodity
        description: "Instrument key."
        data_tests:
          - not_null
          - accepted_values:
              values: ["gold", "bitcoin", "eurusd"]

      - name: symbol
        description: "Market symbol."
        data_tests:
          - not_null

      - name: prev_event_ts
        description: "Timestamp of the previous observation."
        data_tests:
          - not_null

      - name: event_ts
        description: "Timestamp of the current observation."
        data_tests:
          - not_null

      - name: current_price
        description: "Current observed price."
        data_tests:
          - not_null

      - name: prev_price
        description: "Previous observed price."
        data_tests:
          - not_null

      - name: price_change_pct
        description: "Percentage change between consecutive observations."
        data_tests:
          - not_null

      - name: event_type
        description: "Classification of the observed price move."
        data_tests:
          - not_null
          - accepted_values:
              values: ['MEDIUM_MOVE', 'LARGE_MOVE', 'EXTREME_MOVE']

  - name: mart_price_volatility_1h
    description: "Hourly volatility metrics based on stream observations."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["commodity", "symbol", "hour_bucket"]
      - dbt_utils.expression_is_true:
          expression: "observations_count >= 1"
      - dbt_utils.expression_is_true:
          expression: "min_price <= max_price"

    columns:
      - name: commodity
        description: "Instrument key."
        data_tests:
          - not_null
          - accepted_values:
              values: ["gold", "bitcoin", "eurusd"]

      - name: symbol
        description: "Market symbol."
        data_tests:
          - not_null

      - name: hour_bucket
        description: "UTC hourly bucket."
        data_tests:
          - not_null

      - name: observations_count
        description: "Number of observations within the hour."
        data_tests:
          - not_null

      - name: avg_price
        description: "Average price within the hour."
        data_tests:
          - not_null

      - name: min_price
        description: "Minimum price within the hour."
        data_tests:
          - not_null

      - name: max_price
        description: "Maximum price within the hour."
        data_tests:
          - not_null

      - name: price_stddev
        description: "Standard deviation of prices within the hour."
        data_tests:
          - not_null

      - name: price_range
        description: "Absolute price range within the hour."
        data_tests:
          - not_null

      - name: range_pct
        description: "Relative hourly price range in percent."
        data_tests:
          - not_null